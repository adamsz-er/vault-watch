<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      max-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1e1e2e;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #313244;
      background: #181825;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #cdd6f4;
    }

    .badge {
      background: #7c3aed;
      color: white;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Setup screen */
    .setup {
      padding: 20px 16px;
      text-align: center;
    }

    .setup p {
      margin-bottom: 12px;
      color: #a6adc8;
    }

    .setup textarea {
      width: 100%;
      height: 80px;
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      font-family: monospace;
      resize: none;
    }

    .setup button {
      margin-top: 8px;
      padding: 8px 16px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .setup button:hover { opacity: 0.9; }

    /* Inbox list */
    .inbox {
      overflow-y: auto;
      max-height: 420px;
    }

    .card {
      padding: 10px 16px;
      border-bottom: 1px solid #313244;
      cursor: pointer;
      transition: background 0.1s;
    }

    .card:hover { background: #313244; }

    .card.unread {
      border-left: 3px solid #7c3aed;
      background: #1e1e2e;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
    }

    .sender { font-weight: 600; color: #cdd6f4; font-size: 13px; }
    .time { color: #6c7086; font-size: 11px; }

    .action-text { color: #a6adc8; font-size: 12px; margin-bottom: 2px; }
    .summary { color: #6c7086; font-size: 11px; }

    .mention-badge {
      display: inline-block;
      background: #7c3aed;
      color: white;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      margin-top: 3px;
    }

    .open-btn {
      display: inline-block;
      margin-top: 4px;
      padding: 2px 8px;
      background: transparent;
      color: #89b4fa;
      border: 1px solid #45475a;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      text-decoration: none;
    }

    .open-btn:hover { background: #313244; }

    .empty {
      text-align: center;
      padding: 40px 16px;
      color: #6c7086;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      padding: 8px 16px;
      border-top: 1px solid #313244;
      background: #181825;
    }

    .footer button {
      padding: 4px 10px;
      background: transparent;
      color: #6c7086;
      border: 1px solid #45475a;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    .footer button:hover { background: #313244; }
  </style>
</head>
<body>
  <div class="header">
    <h1>VAULT WATCH</h1>
    <span class="badge" id="badge" style="display:none">0</span>
  </div>

  <div id="setup" class="setup" style="display:none">
    <p>Paste your private key JSON from the Obsidian plugin settings:</p>
    <textarea id="keyInput" placeholder='{"memberId":"...","privateKeyX25519":"...","privateKeyEd25519":"..."}'></textarea>
    <button id="saveKeys">Save Keys</button>
  </div>

  <div id="inbox" class="inbox"></div>

  <div class="footer">
    <button id="markAllRead">Mark All Read</button>
    <button id="settings">Settings</button>
  </div>

  <script src="dist/popup.js" type="module"></script>
</body>
</html>
