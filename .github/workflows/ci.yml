name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  plugin:
    name: Plugin (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vault-watch-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vault-watch-plugin/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  chrome:
    name: Chrome extension (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vault-watch-chrome
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vault-watch-chrome/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
